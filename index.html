<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1118">
  <title>LunaStev Emulator Launcher</title>
  <link rel="stylesheet" href="launcher.css">
</head>
<body>
  <main class="stage" aria-label="Android Emulator Launcher">
    <section class="emulator" aria-label="Android emulator shell">
      <div class="bezel">
        <div class="speaker" aria-hidden="true"></div>
        <div class="camera" aria-hidden="true"></div>

        <div class="screen">
          <header class="statusbar" aria-label="status bar">
            <span class="time">09:41</span>
            <div class="status-icons" aria-hidden="true">
              <span class="signal"></span>
              <span class="wifi"></span>
              <span class="battery"><i></i></span>
            </div>
          </header>

          <section class="homescreen" aria-label="home screen">
            <p class="brand">LunaStev Emulator</p>
            <h1>게임 런처</h1>
            <p class="hint">앱 아이콘을 눌러 실행하세요</p>

            <div class="apps" role="list" aria-label="installed apps">
              <a class="app-icon" role="listitem" href="./nut_alignmen/" aria-label="Nut Alignmen 실행">
                <span class="app-badge">🔩</span>
                <span class="app-name">Nut Alignmen</span>
              </a>
            </div>
          </section>

          <footer class="navbar" aria-hidden="true">
            <span class="nav-triangle"></span>
            <span class="nav-circle"></span>
            <span class="nav-square"></span>
          </footer>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
